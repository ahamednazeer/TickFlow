services:
  gateway:
    image: golang:1.22-alpine
    working_dir: /workspace
    command: >
      sh -lc "go mod download &&
      go run ./cmd/main.go"
    volumes:
      - ../services/gateway:/workspace
    environment:
      - TICKFLOW_ENV=${TICKFLOW_ENV:-development}
    restart: unless-stopped

  ingestion:
    image: golang:1.22-alpine
    working_dir: /workspace
    command: >
      sh -lc "go mod download &&
      go run ./cmd/main.go"
    volumes:
      - ../services/ingestion:/workspace
    restart: unless-stopped

  scanner:
    image: rust:1.88-slim
    working_dir: /workspace
    command: >
      sh -lc "cargo run"
    volumes:
      - ../services/scanner:/workspace
      - scanner_cargo_registry:/usr/local/cargo/registry
      - scanner_target:/workspace/target
    environment:
      - RUST_LOG=${RUST_LOG:-debug}
    restart: unless-stopped

  execution:
    image: python:3.12-slim
    working_dir: /workspace
    command: >
      sh -lc "pip install --no-cache-dir -r requirements.txt &&
      python executor.py"
    volumes:
      - ../services/execution:/workspace
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -lc "npm install &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"
    volumes:
      - ../frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    restart: unless-stopped

volumes:
  scanner_cargo_registry:
  scanner_target:
  frontend_node_modules:
